AWSTemplateFormatVersion: '2010-09-09'
-# Description of what this change includes
-# Revision number
-# Date
Description: >
  AWS CloudFormation template to create a beginner-friendly VPC in the
  us-west-2 Region with public subnets across three Availability Zones.

Parameters:
  # CIDR block for the overall VPC
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC
    AllowedPattern: ^(?:\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR range of the form x.x.x.x/x

  # CIDR block for the first public subnet in us-west-2a
  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for Public Subnet 1 in us-west-2a
    AllowedPattern: ^(?:\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  # CIDR block for the second public subnet in us-west-2b
  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for Public Subnet 2 in us-west-2b
    AllowedPattern: ^(?:\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  # CIDR block for the third public subnet in us-west-2c
  PublicSubnet3Cidr:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for Public Subnet 3 in us-west-2c
    AllowedPattern: ^(?:\d{1,3}\.){3}\d{1,3}/\d{1,2}$

Resources:
  # Main VPC that provides the private network boundary for all resources
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC-jerbou3113

  # Internet Gateway allows traffic between the VPC and the internet
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: VPC-jerbou3113-IGW

  # Attach the Internet Gateway to the VPC
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public route table used by all public subnets
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: VPC-jerbou3113-Public-RT

  # Default route to send internet-bound traffic through the Internet Gateway
  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Public subnet in Availability Zone us-west-2a
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: us-west-2a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: VPC-jerbou3113-PublicSubnet-A

  # Public subnet in Availability Zone us-west-2b
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: us-west-2b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: VPC-jerbou3113-PublicSubnet-B

  # Public subnet in Availability Zone us-west-2c
  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet3Cidr
      AvailabilityZone: us-west-2c
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: VPC-jerbou3113-PublicSubnet-C

  # Associate subnet 1 with the public route table
  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # Associate subnet 2 with the public route table
  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Associate subnet 3 with the public route table
  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

Outputs:
  # VPC ID for reference after stack creation
  VpcId:
    Description: ID of the created VPC
    Value: !Ref VPC
    Export:
      Name: VPC-jerbou3113-VpcId

  # Public subnet IDs across three Availability Zones
  PublicSubnet1Id:
    Description: ID of the public subnet in us-west-2a
    Value: !Ref PublicSubnet1

  PublicSubnet2Id:
    Description: ID of the public subnet in us-west-2b
    Value: !Ref PublicSubnet2

  PublicSubnet3Id:
    Description: ID of the public subnet in us-west-2c
    Value: !Ref PublicSubnet3

  # Internet Gateway ID for connectivity reference
  InternetGatewayId:
    Description: ID of the Internet Gateway attached to the VPC
    Value: !Ref InternetGateway